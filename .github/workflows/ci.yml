name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install media test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked

      - name: Unit tests without OpenRouter credentials
        run: cargo test --locked

      - name: Mock render smoke tests without OpenRouter credentials
        run: cargo test --locked -- --ignored --nocapture

      - name: CLI help smoke test
        run: cargo run --locked -- --help
