# cargo-deny policy for Reel Maestro.
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = []

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = [
    { crate = "windows-sys@0.52.0", reason = "pulled by ring while other dependencies use windows-sys 0.61; harmless for the Linux-supported CLI and removable when upstreams converge" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
